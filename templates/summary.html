<header class="summary-header">
  <p>Join 360</p>
  <hr class="only-desktop" />
  <span>Key Metrics at a Glance</span>
  <hr class="only-mobile" />
</header>

<div class="summary-content-area">
  <div class="summary-content">
    <div class="task-overview">
      <div
        onclick="clickInSummaryBoard()"
        class="task-summary-style task-display"
      >
        <img class="edit-img" src="../assets/icons/to_edit_dark.png" alt="" />
        <div class="task-content">
          <p class="task-number" id="task-todo">2</p>
          <p class="task-text">To-do</p>
        </div>
      </div>

      <div
        onclick="clickInSummaryBoard()"
        class="task-summary-style task-display"
      >
        <img
          class="checked-img"
          src="../assets/icons/checked_dark.png"
          alt=""
        />
        <div class="task-content">
          <p class="task-number" id="task-done">1</p>
          <p class="task-text">Done</p>
        </div>
      </div>
    </div>

    <div onclick="clickInSummaryBoard()" class="dated-task">
      <div class="task-summary-style task-display">
        <div class="task-display">
          <img class="high-prio" src="" alt="" />
          <div class="task-content">
            <p class="task-number" id="todo-date">2</p>
            <p class="task-text">To-do</p>
          </div>
        </div>
        <hr />
        <div>
          <p class="task-date" id="date-in-Summary">October 16, 2022</p>
          <p class="task-date-text">Upcoming Deadline</p>
        </div>
      </div>
    </div>

    <div class="task-status">
      <div
        onclick="clickInSummaryBoard()"
        class="task-summary-style task-content"
      >
        <p class="task-number" id="all-tasks">5</p>
        <p class="task-text">Tasks in <br />Board</p>
      </div>

      <div
        onclick="clickInSummaryBoard()"
        class="task-summary-style task-content"
      >
        <p class="task-number" id="in-progress">2</p>
        <p class="task-text">Tasks In <br />Progress</p>
      </div>

      <div
        onclick="clickInSummaryBoard()"
        class="task-summary-style task-content"
      >
        <p class="task-number" id="awaiting-feedback">2</p>
        <p class="task-text">Awaiting <br />Feedback</p>
      </div>
    </div>
  </div>

  <div class="welcome-content">
    <div>
      <p class="welcome-time" id="welcome-time"></p>
      <p class="welcome-name" id="welcome-name"></p>
    </div>
  </div>
</div>
