<!DOCTYPE html>
<html lang="de">

    <head>

        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title></title>

        <!-- FAVICONS -->
        <link rel="icon" type="image/png" href="./assets/icons/favicon.png">

        <!-- AUTOREN-STYLESHEET -->
        <link rel="stylesheet" type="text/css" href="./style.css">
        <link rel="stylesheet" type="text/css" href="./styles/sign_up.css">
       
    </head>

    <body>

        <!-- HEADER -->
        <header class="signup-header">

            <!-- HEADER LOGO -->
            <img class="logo" src="./assets/icons/main_logo_dark.png" alt="Join Logo">

        </header>

        <!-- MAIN -->
        <main class="signup">

            <!-- SIGNUP CARD -->
            <section class="signup-card">

                <!-- HEADER IM FORMULAR -->
                 <div class="signup-form-header">
                    <button class="signup-back" aria-label="go back to login">
                        <!-- arrow icon generated via CSS -->
                    </button>
                    <h1>Sign up</h1>
                </div>

                <!-- FORMULAR -->
                <form class="signup-form" onsubmit="addUser(); return false;">
                    <input id="name-register" type="text" placeholder="Name" required>
                    <input id="email-register" type="email" placeholder="Email" required>
                    <input id="password-register" type="password" placeholder="Password" required>
                    <input id="confirm-password-register" type="password" placeholder="Confirm Password" required>

                <!-- FOOTER IM FORMULAR -->
                    <div class="signup-form-footer">
                        <label>
                            <input type="checkbox" required/>
                                <span>
                                    I accept the <a href="#">Privacy policy</a>
                                </span>
                        </label>
                        <button class="signup-button" type="submit">Sign up</button>
                    </div>
                </form>

            </section>

        </main>

        <!-- FOOTER -->
        <footer class="signup-footer">
            
            <!-- FOOTER LINKS --> 
            <a href="index.html?page=privacy" data-text="Privacy Policy">Privacy Policy</a>
            <a href="index.html?page=legal" data-text="Legal notice">Legal Notice</a>

        </footer>
        
         <!-- AUTOREN-JAVASCRIPT -->
        <script src="./script.js" defer></script>
        <script src="./scripts/sign_up.js" defer></script>

    </body>

</html>
