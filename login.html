<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/login.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
   
    <div class="container-login-form">
        <form class="login-form">
            <section id="container-heading-and-underline" class="container-heading-and-underline">
                <h2 class="login-heading">Log in</h2>
                <div class="underline-login-heading"></div>
            </section>
            <section id="container-login-inputs" class="container-login-inputs">
                <input id="email-input-login" class="inputs-login" type="email" placeholder="Email" required>
                <input  id="password-input-login" class="inputs-login" type="text" placeholder="Password" required>
            </section>
            <section id="container-login-buttons" class="container-login-buttons">
                <button class="buttons-login login-button" id="login">Log in</button>
                <button class="buttons-login guest-login-button" id="guest-login">Guest Log in</button>
            </section>
        </form>
    </div>

</body>
</html>
