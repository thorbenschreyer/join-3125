<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/login.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles/login_resp.css">
</head>
<body class="login-body">

    
    <header class="login-header"></header>
    

    <div class="intro-overlay" id="introOverlay"></div>

    <div class="logo-container" id="logo-container">
        <img src="assets/icons/main_logo_light.png" alt="Join Logo" class="main-logo-mobile">
        <img src="assets/icons/main_logo_dark.png" class="main-logo" alt="Join Logo">
    </div>
   
    <div class="container-login-form">
        <form class="login-form" novalidate onsubmit="loginSubmit(event)">
            <section id="container-heading-and-underline" class="container-heading-and-underline">
                <h2 class="login-heading">Log in</h2>
                <div class="underline-login-heading"></div>
            </section>
            <section id="container-login-inputs" class="container-login-inputs">
                <div class="input-wrapper">
                    <input type="email" class="inputs-login" id="email-input-login" oninput="hideErrorOnInput()" placeholder="Email" required>
                    <img src="../assets/icons/mail.png" class="input-icon" alt="Mail Icon">
                </div>

                <div class="input-wrapper">
                    <input type="password" class="inputs-login" id="password-input-login" oninput="hideErrorOnInput()" placeholder="Password" required>
                    <img id="input-password-img" src="../assets/icons/lock.png" class="input-icon" alt="Lock Icon">
                </div>
                <div id="container-error-message" class="container-error-message d-none">
                    <p id="email-error" class="error-message">Check your email and password. Please try again.</p>
                </div>
            </section>
            <section id="container-login-buttons" class="container-login-buttons">
                <button type="submit" class="buttons-login dark-button" id="login">Log in</button>
                <button type="button" onclick="guestLogin ()" class="buttons-login bright-login-button" id="guest-login">Guest Log in</button>
            </section>
        </form>
    </div>
    <section id="container-signup-and-privacy-policy" class="container-signup-and-privacy-policy">
        <div id="signup-content" class="signup-content">
            <p>Not a Join user?</p>
            <a href="./sign_up.html"><button id="signup-button" class="signup-button dark-button">Sign up</button></a>
        </div>

        <div id="privacy-policy" class="privacy-policy-and-legal-notice-links-container">
            <a onclick="noLoginToShow()" id="privacy-policy-link" class="privacy-and-legal-links" href="index.html?page=privacy">Privacy Policy</a>
            <a id="legal-notice-link" class="privacy-and-legal-links" href="index.html?page=legal">Legal notice</a>
        </div>
    </section>    

</body>
    <script src="scripts/login.js"></script>
    <script src="script.js"></script>
</html>
