<div class="sidebar" id="sidebar">
  <img class="main-logo display-none" src="./assets/icons/main_logo_light.png" alt="" />
  <div class="sidebar-content">
    <div class="menu-items" id="navigation-items"></div>

    <div class="menu-items display-none">
      <a
        class="blue-hover"
        id="privacy_policy"
        onclick="
          (loadHtmlPage('content', './footerpages/privacy_policy.html'),
            toggleIsActive('privacy_policy'))
        "
        >Privacy Policy</a
      >
      <a
        class="blue-hover"
        id="legal_notice"
        onclick="
          (loadHtmlPage('content', './footerpages/legal_notice.html'),
            toggleIsActive('legal_notice'))
        "
        >Legal notice</a
      >
    </div>
  </div>
</div>

<div class="main-area">
  <div class="header" id="header">
    <p class="display-none">Kanban Project Management Tool</p>
    <div class="help-and-logout" id="help-and-logout"></div>
    <div class="header-menu-hide" id="header-menu">
      <a
        onclick="
          (loadHtmlPage('content', './footerpages/legal_notice.html'),
            openCloseHeaderMenu(), toggleIsActive('legal_notice'))
        "
        >Legal Notice</a
      >
      <a
        onclick="
          (loadHtmlPage('content', './footerpages/privacy_policy.html'),
            openCloseHeaderMenu(), toggleIsActive('privacy_policy'))
        "
        >Privacy Policy</a
      >
      <a onclick="(logout(), openCloseHeaderMenu())">Log out</a>
    </div>
  </div>
  <div class="page-content" id="content"></div>
</div>
